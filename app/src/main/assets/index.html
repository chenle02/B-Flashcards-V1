<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>B-Flashcards V1</title><link rel="stylesheet" href="style.css"></head><body><div class="app"><div class="top"><div class="logo">🃏</div><div><h1>B-Flashcards V1</h1><div id="sum" class="sub">Study cards + printout</div></div></div><div class="box"><input id="deck" placeholder="Deck name" value="My Deck"><textarea id="front" placeholder="Front question"></textarea><textarea id="back" placeholder="Back answer"></textarea><button class="btn blue" onclick="addCard()">+ Add Card</button></div><div class="box"><input id="search" placeholder="Search cards" oninput="renderList()"><button id="cardsTab" class="tab on" onclick="mode='cards';draw()">Cards</button><button id="studyTab" class="tab" onclick="mode='study';draw()">Study</button><button id="printTab" class="tab" onclick="mode='print';draw()">Print</button></div><div id="main"></div><div class="bar"><button class="btn blue" onclick="addCard()">Add</button><button class="btn green" onclick="shuffle()">Shuffle</button><button class="btn yellow" onclick="printCards()">Print</button><button class="btn" onclick="openLauncher()">B-Launcher</button><button class="btn" onclick="openTasks()">B-Tasks</button></div></div><script src="app.js"></script></body></html>
